<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าดาวน์โหลดไฟล์</title>
    <style>
        /* ตกแต่งเล็กน้อยให้ดูทันสมัย */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .download-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .info-group {
            text-align: left;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .info-item {
            margin: 8px 0;
            color: #555;
        }
        .label {
            font-weight: bold;
            color: #333;
        }
        .btn-download {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="download-card">
        <h2>📥 ดาวน์โหลดไฟล์</h2>
        
        <div class="info-group">
            <div class="info-item">
                <span class="label">ชื่อไฟล์:</span> test.pdf
            </div>
            <div class="info-item">
                <span class="label">ขนาดไฟล์:</span> 147.40 KB
            </div>
            <div class="info-item">
                <span class="label">ผู้อัพโหลด:</span> S4ad0wKhab
            </div>
        </div>

        <a href="test.pdf" download class="btn-download">
            คลิกเพื่อดาวน์โหลด
        </a>
    </div>

</body>
</html>
